<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link rel="icon" type="image/jpeg" href="/images/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ever Fit — Premium Clothing Brand</title>
    <meta name="description" content="Ever Fit — Premium clothing brand. Shop the latest fashion collections in Sri Lanka." />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-title">EVER FIT</div>
      <div class="loader-line"></div>
      <div class="loader-subtitle">Premium Clothing</div>
      <div class="loader-bar-track"><div class="loader-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.__removeLoader = function() {
        var loader = document.getElementById('app-loader');
        if (loader) { loader.classList.add('loaded'); setTimeout(function() { loader.remove(); }, 500); }
      };
      setTimeout(window.__removeLoader, 8000);
    </script>
  </body>
</html>
